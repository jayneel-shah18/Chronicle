<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Long-Term Goals - Life Dashboard</title>
  <style>
    :root {
      --bg-dark: #0f172a;
      --card-bg: #1e293b;
      --text-light: #f1f5f9;
      --text-muted: #94a3b8;
      --blue: #3b82f6;
      --amber: #f59e0b;
      --emerald: #10b981;
      --rose: #f43f5e;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--card-bg);
      color: var(--text-light);
      padding: 0.75rem 1.25rem;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s;
      border: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 2rem;
    }

    .back-btn:hover {
      background: rgba(245, 158, 11, 0.1);
      border-color: var(--amber);
    }

    .card {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--amber), var(--emerald));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--text-muted);
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .input-group {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    input[type="text"] {
      flex: 1;
      background: rgba(15, 23, 42, 0.6);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 0.875rem 1rem;
      color: var(--text-light);
      font-size: 0.95rem;
      transition: all 0.2s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--amber);
      background: rgba(15, 23, 42, 0.8);
    }

    input[type="text"]::placeholder {
      color: var(--text-muted);
    }

    .add-btn {
      background: var(--amber);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 0.875rem 1.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.95rem;
    }

    .add-btn:hover {
      background: #d97706;
      transform: translateY(-2px);
    }

    .goals-list {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .goal-card {
      background: rgba(15, 23, 42, 0.4);
      border-radius: 16px;
      padding: 1.5rem;
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: all 0.2s;
    }

    .goal-card:hover {
      background: rgba(15, 23, 42, 0.6);
      border-color: rgba(245, 158, 11, 0.3);
    }

    .goal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
    }

    .goal-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-light);
      flex: 1;
    }

    .delete-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.25rem 0.5rem;
      border-radius: 6px;
      transition: all 0.2s;
      font-size: 1.2rem;
    }

    .delete-btn:hover {
      background: rgba(244, 63, 94, 0.1);
      color: var(--rose);
    }

    .progress-section {
      margin-top: 1rem;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .progress-label {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .progress-value {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--amber);
    }

    .progress-bar-container {
      background: rgba(15, 23, 42, 0.6);
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 0.75rem;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--amber), var(--emerald));
      border-radius: 999px;
      transition: width 0.3s ease;
    }

    .progress-controls {
      display: flex;
      gap: 0.5rem;
    }

    .progress-btn {
      flex: 1;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-light);
      padding: 0.5rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.2s;
    }

    .progress-btn:hover {
      background: rgba(245, 158, 11, 0.1);
      border-color: var(--amber);
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-btn">
      <span>←</span>
      <span>Back to Dashboard</span>
    </a>

    <div class="card">
      <h1>🎯 Long-Term Goals</h1>
      <p class="subtitle">Track your journey to greatness</p>

      <div class="input-group">
        <input type="text" id="goalInput" placeholder="What's your next big goal?" />
        <button class="add-btn" onclick="addGoal()">Add Goal</button>
      </div>

      <div class="goals-list" id="goalsList">
        <div class="empty-state">No goals yet. Set your first goal above! 🚀</div>
      </div>
    </div>
  </div>

  <script>
    let goals = JSON.parse(localStorage.getItem('goals')) || [];

    function renderGoals() {
      const list = document.getElementById('goalsList');
      
      if (goals.length === 0) {
        list.innerHTML = '<div class="empty-state">No goals yet. Set your first goal above! 🚀</div>';
      } else {
        list.innerHTML = goals.map((goal, index) => `
          <div class="goal-card">
            <div class="goal-header">
              <div class="goal-title">${goal.title}</div>
              <button class="delete-btn" onclick="deleteGoal(${index})">×</button>
            </div>
            
            <div class="progress-section">
              <div class="progress-header">
                <span class="progress-label">Progress</span>
                <span class="progress-value">${goal.progress}%</span>
              </div>
              
              <div class="progress-bar-container">
                <div class="progress-bar-fill" style="width: ${goal.progress}%"></div>
              </div>
              
              <div class="progress-controls">
                <button class="progress-btn" onclick="updateProgress(${index}, -10)">-10%</button>
                <button class="progress-btn" onclick="updateProgress(${index}, -5)">-5%</button>
                <button class="progress-btn" onclick="updateProgress(${index}, 5)">+5%</button>
                <button class="progress-btn" onclick="updateProgress(${index}, 10)">+10%</button>
              </div>
            </div>
          </div>
        `).join('');
      }
    }

    function addGoal() {
      const input = document.getElementById('goalInput');
      const title = input.value.trim();
      
      if (title) {
        goals.push({ title, progress: 0 });
        input.value = '';
        saveGoals();
        renderGoals();
      }
    }

    function updateProgress(index, delta) {
      goals[index].progress = Math.max(0, Math.min(100, goals[index].progress + delta));
      saveGoals();
      renderGoals();
    }

    function deleteGoal(index) {
      goals.splice(index, 1);
      saveGoals();
      renderGoals();
    }

    function saveGoals() {
      localStorage.setItem('goals', JSON.stringify(goals));
    }

    // Allow Enter key to add goal
    document.getElementById('goalInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addGoal();
    });

    // Initial render
    renderGoals();
  </script>
</body>
</html>
