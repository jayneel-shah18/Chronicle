<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Journal - Life Dashboard</title>
  <style>
    :root {
      --bg-dark: #0f172a;
      --card-bg: #1e293b;
      --text-light: #f1f5f9;
      --text-muted: #94a3b8;
      --blue: #3b82f6;
      --amber: #f59e0b;
      --emerald: #10b981;
      --rose: #f43f5e;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--card-bg);
      color: var(--text-light);
      padding: 0.75rem 1.25rem;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s;
      border: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 2rem;
    }

    .back-btn:hover {
      background: rgba(244, 63, 94, 0.1);
      border-color: var(--rose);
    }

    .card {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.05);
      margin-bottom: 2rem;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--rose), var(--amber));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--text-muted);
      margin-bottom: 1.5rem;
      font-size: 0.95rem;
    }

    .date-display {
      display: inline-block;
      background: rgba(244, 63, 94, 0.1);
      color: var(--rose);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      margin-bottom: 1.5rem;
    }

    textarea {
      width: 100%;
      min-height: 300px;
      background: rgba(15, 23, 42, 0.6);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 1.25rem;
      color: var(--text-light);
      font-size: 1rem;
      line-height: 1.6;
      resize: vertical;
      font-family: inherit;
      transition: all 0.2s;
    }

    textarea:focus {
      outline: none;
      border-color: var(--rose);
      background: rgba(15, 23, 42, 0.8);
    }

    textarea::placeholder {
      color: var(--text-muted);
    }

    .save-btn {
      width: 100%;
      background: var(--rose);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 1rem;
      margin-top: 1rem;
    }

    .save-btn:hover {
      background: #e11d48;
      transform: translateY(-2px);
    }

    .past-entries-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 1rem;
      color: var(--text-light);
    }

    .entries-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .entry-item {
      background: rgba(15, 23, 42, 0.4);
      border-radius: 12px;
      padding: 1.25rem;
      border: 1px solid rgba(255, 255, 255, 0.05);
      cursor: pointer;
      transition: all 0.2s;
    }

    .entry-item:hover {
      background: rgba(15, 23, 42, 0.6);
      border-color: rgba(244, 63, 94, 0.3);
    }

    .entry-date {
      font-weight: 600;
      color: var(--rose);
      margin-bottom: 0.5rem;
      font-size: 0.9rem;
    }

    .entry-preview {
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .delete-entry-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.25rem 0.5rem;
      border-radius: 6px;
      transition: all 0.2s;
      font-size: 1.1rem;
      float: right;
    }

    .delete-entry-btn:hover {
      background: rgba(244, 63, 94, 0.1);
      color: var(--rose);
    }

    .empty-state {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .word-count {
      text-align: right;
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-top: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-btn">
      <span>←</span>
      <span>Back to Dashboard</span>
    </a>

    <div class="card">
      <h1>📖 Daily Journal</h1>
      <p class="subtitle">Capture your thoughts and reflections</p>

      <div class="date-display" id="currentDate"></div>

      <textarea 
        id="journalText" 
        placeholder="How was your day? What are you grateful for? What did you learn?"
      ></textarea>
      
      <div class="word-count" id="wordCount">0 words</div>
      
      <button class="save-btn" onclick="saveEntry()">💾 Save Entry</button>
    </div>

    <div class="card">
      <div class="past-entries-title">📚 Past Entries</div>
      <div class="entries-list" id="entriesList">
        <div class="empty-state">No past entries yet. Start journaling above! ✨</div>
      </div>
    </div>
  </div>

  <script>
    let entries = JSON.parse(localStorage.getItem('journalEntries')) || {};
    let currentDate = new Date().toISOString().split('T')[0];

    function formatDate(dateStr) {
      const date = new Date(dateStr + 'T00:00:00');
      return date.toLocaleDateString('en-US', { 
        weekday: 'long', 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric' 
      });
    }

    function updateWordCount() {
      const text = document.getElementById('journalText').value;
      const words = text.trim() ? text.trim().split(/\s+/).length : 0;
      document.getElementById('wordCount').textContent = `${words} word${words !== 1 ? 's' : ''}`;
    }

    function loadTodayEntry() {
      document.getElementById('currentDate').textContent = formatDate(currentDate);
      document.getElementById('journalText').value = entries[currentDate] || '';
      updateWordCount();
    }

    function saveEntry() {
      const text = document.getElementById('journalText').value.trim();
      
      if (text) {
        entries[currentDate] = text;
        localStorage.setItem('journalEntries', JSON.stringify(entries));
        renderEntries();
        
        // Visual feedback
        const btn = document.querySelector('.save-btn');
        btn.textContent = '✓ Saved!';
        setTimeout(() => {
          btn.textContent = '💾 Save Entry';
        }, 2000);
      }
    }

    function renderEntries() {
      const list = document.getElementById('entriesList');
      const sortedDates = Object.keys(entries).sort().reverse();
      
      if (sortedDates.length === 0) {
        list.innerHTML = '<div class="empty-state">No past entries yet. Start journaling above! ✨</div>';
      } else {
        list.innerHTML = sortedDates.map(date => `
          <div class="entry-item" onclick="loadEntry('${date}')">
            <button class="delete-entry-btn" onclick="deleteEntry(event, '${date}')">×</button>
            <div class="entry-date">${formatDate(date)}</div>
            <div class="entry-preview">${entries[date]}</div>
          </div>
        `).join('');
      }
    }

    function loadEntry(date) {
      currentDate = date;
      loadTodayEntry();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteEntry(event, date) {
      event.stopPropagation();
      if (confirm('Delete this journal entry?')) {
        delete entries[date];
        localStorage.setItem('journalEntries', JSON.stringify(entries));
        if (date === currentDate) {
          document.getElementById('journalText').value = '';
          updateWordCount();
        }
        renderEntries();
      }
    }

    // Word count update
    document.getElementById('journalText').addEventListener('input', updateWordCount);

    // Auto-save on typing (debounced)
    let saveTimeout;
    document.getElementById('journalText').addEventListener('input', () => {
      clearTimeout(saveTimeout);
      saveTimeout = setTimeout(() => {
        const text = document.getElementById('journalText').value.trim();
        if (text) {
          entries[currentDate] = text;
          localStorage.setItem('journalEntries', JSON.stringify(entries));
        }
      }, 1000);
    });

    // Initial load
    loadTodayEntry();
    renderEntries();
  </script>
</body>
</html>
