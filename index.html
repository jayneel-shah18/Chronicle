<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Life Dashboard</title>

    <!-- Tailwind (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React 18 (UMD) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel for in-browser JSX transpilation (dev/demo use) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      /* Small quality-of-life tweaks */
      body { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Liberation Sans", sans-serif; }
    </style>
  </head>

  <body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useMemo } = React;

      // Lightweight icon components (replacing lucide-react) using simple glyphs.
      // They accept the same props the app uses: size + className.
      const makeGlyphIcon = (glyph) => ({ size = 24, className = "" }) => (
        <span
          className={className}
          style={{
            display: 'inline-flex',
            alignItems: 'center',
            justifyContent: 'center',
            width: size,
            height: size,
            fontSize: Math.max(10, Math.floor(size * 0.8)),
            lineHeight: 1,
            userSelect: 'none',
          }}
          aria-hidden="true"
        >
          {glyph}
        </span>
      );

      const CheckCircle2 = makeGlyphIcon('✔');
      const Circle = makeGlyphIcon('○');
      const Plus = makeGlyphIcon('+');
      const Trash2 = makeGlyphIcon('✕');
      const Target = makeGlyphIcon('◎');
      const BookOpen = makeGlyphIcon('≡');
      const Flame = makeGlyphIcon('▲');
      const DollarSign = makeGlyphIcon('$');
      const Gift = makeGlyphIcon('◇');
      const AlertTriangle = makeGlyphIcon('!');
      const ChevronLeft = makeGlyphIcon('‹');
      const ChevronRight = makeGlyphIcon('›');
      const CalendarIcon = makeGlyphIcon('▦');

      const App = () => {
        // --- State Management ---
        const [selectedDate, setSelectedDate] = useState(new Date());
        const [todos, setTodos] = useState({});
        const [longTermGoals, setLongTermGoals] = useState([]);
        const [journalEntries, setJournalEntries] = useState({});
        const [habits, setHabits] = useState([]);
        const [habitData, setHabitData] = useState({});
        const [expenses, setExpenses] = useState([]);
        const [checklists, setChecklists] = useState({
          rewards: [{ id: 1, text: "Buy a new video game", cost: "50 tasks", achieved: false }],
          punishments: [{ id: 2, text: "No social media tomorrow", triggered: false }],
        });

        const dateKey = selectedDate.toISOString().split('T')[0];
        const isToday = new Date().toISOString().split('T')[0] === dateKey;

        // --- Load data from localStorage ---
        useEffect(() => {
          const loadData = () => {
            // Load todos
            const storedTodos = localStorage.getItem('todos');
            if (storedTodos) {
              try {
                const parsed = JSON.parse(storedTodos);
                setTodos(prev => JSON.stringify(prev) === storedTodos ? prev : parsed);
              } catch (e) {}
            }

            // Load goals
            const storedGoals = localStorage.getItem('goals');
            if (storedGoals) {
              try {
                const parsed = JSON.parse(storedGoals);
                setLongTermGoals(prev => JSON.stringify(prev) === storedGoals ? prev : parsed);
              } catch (e) {}
            }

            // Load journal entries
            const storedJournal = localStorage.getItem('journalEntries');
            if (storedJournal) {
              try {
                const parsed = JSON.parse(storedJournal);
                setJournalEntries(prev => JSON.stringify(prev) === storedJournal ? prev : parsed);
              } catch (e) {}
            }

            // Load habits
            const storedHabits = localStorage.getItem('habits');
            if (storedHabits) {
              try {
                const habitsArray = JSON.parse(storedHabits);
                const mapped = habitsArray.map((name, idx) => ({
                  id: idx + 1,
                  name: name,
                  completions: {}
                }));
                setHabits(prev => JSON.stringify(prev.map(h => h.name)) === storedHabits ? prev : mapped);
              } catch (e) {}
            }

            // Load habit data
            const storedHabitData = localStorage.getItem('habitData');
            if (storedHabitData) {
              try {
                const parsed = JSON.parse(storedHabitData);
                setHabitData(prev => JSON.stringify(prev) === storedHabitData ? prev : parsed);
              } catch (e) {}
            }

            // Load expenses
            const storedExpenses = localStorage.getItem('expenses');
            if (storedExpenses) {
              try {
                const parsed = JSON.parse(storedExpenses);
                setExpenses(prev => JSON.stringify(prev) === storedExpenses ? prev : parsed);
              } catch (e) {}
            }
          };

          loadData();

          // Listen for storage changes from other tabs/windows
          const handleStorage = (e) => {
            if (e.key === 'todos' || e.key === 'goals' || e.key === 'journalEntries' || 
                e.key === 'habits' || e.key === 'habitData' || e.key === 'expenses') {
              loadData();
            }
          };

          window.addEventListener('storage', handleStorage);

          // Poll for changes every 2 seconds (for same-tab updates)
          const interval = setInterval(loadData, 2000);

          return () => {
            window.removeEventListener('storage', handleStorage);
            clearInterval(interval);
          };
        }, []);

        // --- Helpers ---
        const formatDate = (date) => {
          return date.toLocaleDateString('en-US', {
            weekday: 'long',
            year: 'numeric',
            month: 'long',
            day: 'numeric',
          });
        };

        const daysInYear = useMemo(() => {
          const year = new Date().getFullYear();
          const start = new Date(year, 0, 1);
          const days = [];
          for (let i = 0; i < 366; i++) {
            const d = new Date(start);
            d.setDate(start.getDate() + i);
            if (d.getFullYear() !== year) break;
            days.push(d);
          }
          return days;
        }, []);

        // --- Handlers ---
        const addItem = (setter, key, item) => {
          // Read current state from localStorage to avoid race conditions
          const current = JSON.parse(localStorage.getItem('todos') || '{}');
          const updated = {
            ...current,
            [key]: [...(current[key] || []), { id: Date.now(), ...item }],
          };
          localStorage.setItem('todos', JSON.stringify(updated));
          setter(updated);
        };

        const toggleStatus = (setter, key, id) => {
          // Read current state from localStorage to avoid race conditions
          const current = JSON.parse(localStorage.getItem('todos') || '{}');
          const updated = {
            ...current,
            [key]: (current[key] || []).map((item) =>
              item.id === id ? { ...item, completed: !item.completed } : item
            ),
          };
          localStorage.setItem('todos', JSON.stringify(updated));
          setter(updated);
        };

        const deleteItem = (setter, key, id) => {
          // Read current state from localStorage to avoid race conditions
          const current = JSON.parse(localStorage.getItem('todos') || '{}');
          const updated = {
            ...current,
            [key]: (current[key] || []).filter((item) => item.id !== id),
          };
          localStorage.setItem('todos', JSON.stringify(updated));
          setter(updated);
        };

        // --- Sub-Components ---
        const SectionHeader = ({ icon: Icon, title, color }) => (
          <div className={`flex items-center gap-2 mb-4 font-bold text-sm uppercase tracking-wider ${color}`}>
            <Icon size={18} />
            <span>{title}</span>
          </div>
        );

        const Card = ({ children, className = "" }) => (
          <div className={`bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 p-5 mb-6 ${className}`}>
            {children}
          </div>
        );

        return (
          <div className="min-h-screen bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 p-4 md:p-8">
            <div className="max-w-[1600px] mx-auto">
              {/* Header */}
              <header className="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
                <div>
                  <h1 className="text-3xl font-extrabold tracking-tight">Life Dashboard</h1>
                  <p className="text-slate-500 font-medium">{formatDate(selectedDate)}</p>
                </div>
                <div className="flex items-center bg-white dark:bg-slate-800 rounded-xl p-1 shadow-sm border border-slate-100 dark:border-slate-700">
                  <button
                    onClick={() => setSelectedDate(new Date(selectedDate.setDate(selectedDate.getDate() - 1)))}
                    className="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition-colors"
                    aria-label="Previous day"
                  >
                    <ChevronLeft size={20} />
                  </button>
                  <button
                    onClick={() => setSelectedDate(new Date())}
                    className="px-4 py-1 text-sm font-semibold hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg"
                  >
                    Today
                  </button>
                  <button
                    onClick={() => setSelectedDate(new Date(selectedDate.setDate(selectedDate.getDate() + 1)))}
                    className="p-2 hover:bg-slate-100 dark:hover:bg-slate-700 rounded-lg transition-colors"
                    aria-label="Next day"
                  >
                    <ChevronRight size={20} />
                  </button>
                </div>
              </header>

              <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                {/* LEFT COLUMN: Daily Core */}
                <div className="lg:col-span-3 space-y-6">
                  <Card>
                    <div className="flex items-center justify-between mb-4">
                      <SectionHeader icon={CheckCircle2} title="To-Dos for the Day" color="text-indigo-500" />
                      <a href="todos.html" className="text-xs font-semibold text-indigo-500 hover:text-indigo-400 transition-colors">View All →</a>
                    </div>
                    <div className="space-y-3">
                      {(todos[dateKey] || []).slice(-3).map((todo) => (
                        <div key={todo.id} className="flex items-center justify-between group">
                          <button
                            onClick={() => toggleStatus(setTodos, dateKey, todo.id)}
                            className="flex items-center gap-3 text-sm flex-1"
                          >
                            {todo.completed ? (
                              <CheckCircle2 size={18} className="text-emerald-500" />
                            ) : (
                              <Circle size={18} className="text-slate-300" />
                            )}
                            <span className={todo.completed ? "line-through text-slate-400" : ""}>{todo.text}</span>
                          </button>
                          <button
                            onClick={() => deleteItem(setTodos, dateKey, todo.id)}
                            className="opacity-0 group-hover:opacity-100 text-slate-400 hover:text-red-500 transition-all"
                            aria-label="Delete todo"
                          >
                            <Trash2 size={14} />
                          </button>
                        </div>
                      ))}
                      {(todos[dateKey] || []).length === 0 && (
                        <div className="text-xs text-slate-400 text-center py-2">No tasks yet</div>
                      )}
                      {(todos[dateKey] || []).length > 3 && (
                        <div className="text-xs text-slate-400 text-center pt-2">+{(todos[dateKey] || []).length - 3} more</div>
                      )}
                      <div className="flex gap-2 pt-2">
                        <input
                          type="text"
                          placeholder="New task..."
                          className="w-full text-sm bg-slate-50 dark:bg-slate-900 border-none rounded-lg px-3 py-2 outline-none focus:ring-2 ring-indigo-500/20"
                          onKeyDown={(e) => {
                            if (e.key === 'Enter' && e.target.value) {
                              addItem(setTodos, dateKey, { text: e.target.value, completed: false });
                              e.target.value = '';
                            }
                          }}
                        />
                      </div>
                    </div>
                  </Card>

                  <Card>
                    <div className="flex items-center justify-between mb-4">
                      <SectionHeader icon={Target} title="Long-Term Goals" color="text-amber-500" />
                      <a href="goals.html" className="text-xs font-semibold text-amber-500 hover:text-amber-400 transition-colors">Manage →</a>
                    </div>
                    <div className="space-y-3">
                      {longTermGoals.slice(0, 3).map((goal) => (
                        <div key={goal.id} className="flex items-center gap-3 text-sm">
                          <Target size={14} className="text-amber-400" />
                          <div className="flex-1">
                            <div className="text-sm">{goal.title}</div>
                            <div className="text-xs text-slate-400 mt-1">Progress: {goal.progress}%</div>
                          </div>
                        </div>
                      ))}
                      {longTermGoals.length === 0 && (
                        <div className="text-xs text-slate-400 text-center py-2">No goals yet</div>
                      )}
                      {longTermGoals.length > 3 && (
                        <div className="text-xs text-slate-400 text-center pt-2">+{longTermGoals.length - 3} more</div>
                      )}
                    </div>
                  </Card>

                  <Card>
                    <div className="flex items-center justify-between mb-4">
                      <SectionHeader icon={BookOpen} title="Journal Entry" color="text-rose-500" />
                      <a href="journal.html" className="text-xs font-semibold text-rose-500 hover:text-rose-400 transition-colors">Full Journal →</a>
                    </div>
                    <textarea
                      value={journalEntries[dateKey] || ""}
                      onChange={(e) => {
                        const updated = { ...journalEntries, [dateKey]: e.target.value };
                        setJournalEntries(updated);
                        localStorage.setItem('journalEntries', JSON.stringify(updated));
                      }}
                      placeholder="How was your day? Any reflections?"
                      className="w-full h-40 bg-slate-50 dark:bg-slate-900 border-none rounded-xl p-4 text-sm resize-none outline-none focus:ring-2 ring-rose-500/20"
                    />
                  </Card>
                </div>

                {/* CENTER COLUMN: Calendar Grid */}
                <div className="lg:col-span-6">
                  <Card className="h-full">
                    <div className="flex items-center justify-between mb-8">
                      <SectionHeader icon={CalendarIcon} title="365-Day Life Grid" color="text-blue-500" />
                      <span className="text-xs font-bold text-slate-400 uppercase tracking-widest">Year {new Date().getFullYear()}</span>
                    </div>

                    <div className="flex flex-wrap gap-2 justify-center">
                      {daysInYear.map((day, idx) => {
                        const dKey = day.toISOString().split('T')[0];
                        const isActive = dKey === dateKey;
                        const isTodayDot = new Date().toISOString().split('T')[0] === dKey;

                        // Simple heat map logic (tasks + journal length)
                        const activityLevel = (todos[dKey]?.length || 0) + (journalEntries[dKey]?.length ? 1 : 0);

                        return (
                          <button
                            key={idx}
                            onClick={() => setSelectedDate(new Date(day))}
                            className={`
                              w-4 h-4 md:w-5 md:h-5 rounded-sm transition-all relative group
                              ${isActive ? 'ring-2 ring-blue-500 ring-offset-2 scale-110 z-10' : ''}
                              ${isTodayDot ? 'border-2 border-red-400' : ''}
                              ${
                                activityLevel > 3
                                  ? 'bg-blue-600'
                                  : activityLevel > 1
                                    ? 'bg-blue-400'
                                    : activityLevel > 0
                                      ? 'bg-blue-200'
                                      : 'bg-slate-100 dark:bg-slate-700'
                              }
                            `}
                            aria-label={day.toDateString()}
                          >
                            <span className="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 px-2 py-1 bg-slate-800 text-white text-[10px] rounded opacity-0 group-hover:opacity-100 pointer-events-none whitespace-nowrap z-20 transition-opacity">
                              {day.toLocaleDateString(undefined, { month: 'short', day: 'numeric' })}
                            </span>
                          </button>
                        );
                      })}
                    </div>
                    <div className="mt-8 flex justify-center gap-6 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                      <div className="flex items-center gap-2">
                        <div className="w-3 h-3 bg-slate-100 dark:bg-slate-700 rounded-sm"></div> Empty
                      </div>
                      <div className="flex items-center gap-2">
                        <div className="w-3 h-3 bg-blue-200 rounded-sm"></div> Low Activity
                      </div>
                      <div className="flex items-center gap-2">
                        <div className="w-3 h-3 bg-blue-600 rounded-sm"></div> High Activity
                      </div>
                      <div className="flex items-center gap-2">
                        <div className="w-3 h-3 border border-red-400 rounded-sm"></div> Today
                      </div>
                    </div>
                  </Card>
                </div>

                {/* RIGHT COLUMN: Habits & Finance */}
                <div className="lg:col-span-3 space-y-6">
                  <Card>
                    <div className="flex items-center justify-between mb-4">
                      <SectionHeader icon={Flame} title="Habit Tracker" color="text-orange-500" />
                      <a href="habits.html" className="text-xs font-semibold text-orange-500 hover:text-orange-400 transition-colors">Track More →</a>
                    </div>
                    <div className="space-y-4">
                      {habits.slice(0, 3).map((habit) => {
                        const key = `${habit.name}-${dateKey}`;
                        const status = habitData[key] || 'none';
                        return (
                          <div key={habit.id} className="flex items-center justify-between">
                            <span className="text-sm font-medium">{habit.name}</span>
                            <div className="flex gap-1">
                              <button
                                onClick={() => {
                                  const newData = { ...habitData, [key]: status === 'success' ? 'none' : 'success' };
                                  setHabitData(newData);
                                  localStorage.setItem('habitData', JSON.stringify(newData));
                                }}
                                className={`px-2 py-1 rounded-lg text-[10px] font-bold uppercase transition-all ${
                                  status === 'success'
                                    ? 'bg-emerald-500 text-white'
                                    : 'bg-slate-100 dark:bg-slate-700 text-slate-400 hover:bg-emerald-100 dark:hover:bg-emerald-900'
                                }`}
                              >
                                ✓ Done
                              </button>
                              <button
                                onClick={() => {
                                  const newData = { ...habitData, [key]: status === 'fail' ? 'none' : 'fail' };
                                  setHabitData(newData);
                                  localStorage.setItem('habitData', JSON.stringify(newData));
                                }}
                                className={`px-2 py-1 rounded-lg text-[10px] font-bold uppercase transition-all ${
                                  status === 'fail'
                                    ? 'bg-rose-500 text-white'
                                    : 'bg-slate-100 dark:bg-slate-700 text-slate-400 hover:bg-rose-100 dark:hover:bg-rose-900'
                                }`}
                              >
                                ✕ Skip
                              </button>
                            </div>
                          </div>
                        );
                      })}
                      {habits.length === 0 && (
                        <div className="text-xs text-slate-400 text-center py-2">No habits yet</div>
                      )}
                      {habits.length > 3 && (
                        <div className="text-xs text-slate-400 text-center pt-2">+{habits.length - 3} more</div>
                      )}
                    </div>
                  </Card>

                  <Card>
                    <div className="flex items-center justify-between mb-4">
                      <SectionHeader icon={DollarSign} title="Expense Tracker" color="text-emerald-500" />
                      <a href="expenses.html" className="text-xs font-semibold text-emerald-500 hover:text-emerald-400 transition-colors">View Details →</a>
                    </div>
                    <div className="space-y-3">
                      {expenses.slice(0, 3).map((exp, idx) => (
                        <div key={idx} className="flex items-center justify-between text-sm">
                          <span className="text-slate-500">{exp.name}</span>
                          <span className="font-mono font-bold text-emerald-600">${parseFloat(exp.amount).toFixed(2)}</span>
                        </div>
                      ))}
                      {expenses.length === 0 && (
                        <div className="text-xs text-slate-400 text-center py-2">No expenses yet</div>
                      )}
                      {expenses.length > 3 && (
                        <div className="text-xs text-slate-400 text-center pt-2">+{expenses.length - 3} more</div>
                      )}
                      <div className="text-xs text-slate-400 mt-3 pt-3 border-t border-slate-700">
                        Total: ${expenses.reduce((sum, exp) => sum + parseFloat(exp.amount || 0), 0).toFixed(2)}
                      </div>
                    </div>
                  </Card>

                  <Card className="bg-gradient-to-br from-slate-800 to-slate-900 text-white border-none">
                    <SectionHeader icon={Gift} title="Checklist + Rewards" color="text-purple-400" />
                    <div className="space-y-4">
                      <div className="p-3 bg-white/5 rounded-xl">
                        <p className="text-[10px] font-bold text-purple-400 mb-2 tracking-widest uppercase">Rewards</p>
                        {checklists.rewards.map((r) => (
                          <div key={r.id} className="flex items-center gap-2 text-xs mb-1">
                            <Gift size={12} className="text-purple-400" />
                            <span>
                              {r.text} ({r.cost})
                            </span>
                          </div>
                        ))}
                      </div>
                      <div className="p-3 bg-white/5 rounded-xl">
                        <p className="text-[10px] font-bold text-rose-400 mb-2 tracking-widest uppercase">Punishments</p>
                        {checklists.punishments.map((p) => (
                          <div key={p.id} className="flex items-center gap-2 text-xs">
                            <AlertTriangle size={12} className="text-rose-400" />
                            <span>{p.text}</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  </Card>
                </div>
              </div>
            </div>
          </div>
        );
      };

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
