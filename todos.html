<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Dos - Life Dashboard</title>
  <style>
    :root {
      --bg-dark: #0f172a;
      --card-bg: #1e293b;
      --text-light: #f1f5f9;
      --text-muted: #94a3b8;
      --blue: #3b82f6;
      --amber: #f59e0b;
      --emerald: #10b981;
      --rose: #f43f5e;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: var(--bg-dark);
      color: var(--text-light);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--card-bg);
      color: var(--text-light);
      padding: 0.75rem 1.25rem;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s;
      border: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 2rem;
    }

    .back-btn:hover {
      background: rgba(59, 130, 246, 0.1);
      border-color: var(--blue);
    }

    .card {
      background: var(--card-bg);
      border-radius: 20px;
      padding: 2rem;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, var(--blue), var(--emerald));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      color: var(--text-muted);
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }

    .input-group {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    input[type="text"] {
      flex: 1;
      background: rgba(15, 23, 42, 0.6);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      padding: 0.875rem 1rem;
      color: var(--text-light);
      font-size: 0.95rem;
      transition: all 0.2s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: var(--blue);
      background: rgba(15, 23, 42, 0.8);
    }

    input[type="text"]::placeholder {
      color: var(--text-muted);
    }

    .add-btn {
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 0.875rem 1.75rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.95rem;
    }

    .add-btn:hover {
      background: #2563eb;
      transform: translateY(-2px);
    }

    .todos-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .todo-item {
      background: rgba(15, 23, 42, 0.4);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: all 0.2s;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .todo-item:hover {
      background: rgba(15, 23, 42, 0.6);
      border-color: rgba(59, 130, 246, 0.3);
    }

    .todo-checkbox {
      width: 22px;
      height: 22px;
      cursor: pointer;
      accent-color: var(--emerald);
    }

    .todo-text {
      flex: 1;
      font-size: 0.95rem;
      transition: all 0.2s;
    }

    .todo-text.completed {
      text-decoration: line-through;
      color: var(--text-muted);
      opacity: 0.6;
    }

    .delete-btn {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0.5rem;
      border-radius: 8px;
      transition: all 0.2s;
      font-size: 1.2rem;
      line-height: 1;
    }

    .delete-btn:hover {
      background: rgba(244, 63, 94, 0.1);
      color: var(--rose);
    }

    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .stats {
      display: flex;
      gap: 1.5rem;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .stat {
      flex: 1;
      text-align: center;
    }

    .stat-value {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--blue);
    }

    .stat-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 0.25rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-btn">
      <span>←</span>
      <span>Back to Dashboard</span>
    </a>

    <div class="card">
      <h1>📝 To-Dos for Today</h1>
      <p class="subtitle">Stay focused and get things done</p>

      <div class="input-group">
        <input type="text" id="todoInput" placeholder="What needs to be done?" />
        <button class="add-btn" onclick="addTodo()">Add Task</button>
      </div>

      <div class="todos-list" id="todosList">
        <div class="empty-state">No tasks yet. Add one above to get started! 🚀</div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-value" id="totalCount">0</div>
          <div class="stat-label">Total</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="completedCount">0</div>
          <div class="stat-label">Completed</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="remainingCount">0</div>
          <div class="stat-label">Remaining</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let todos = {};
    const dateKey = new Date().toISOString().split('T')[0];

    // Load todos from localStorage
    function loadTodos() {
      const stored = localStorage.getItem('todos');
      if (stored) {
        try {
          todos = JSON.parse(stored);
        } catch (e) {
          todos = {};
        }
      }
    }

    loadTodos();

    function renderTodos() {
      const list = document.getElementById('todosList');
      const todayTodos = todos[dateKey] || [];
      
      if (todayTodos.length === 0) {
        list.innerHTML = '<div class="empty-state">No tasks yet. Add one above to get started! 🚀</div>';
      } else {
        list.innerHTML = todayTodos.map((todo, index) => `
          <div class="todo-item">
            <input 
              type="checkbox" 
              class="todo-checkbox" 
              ${todo.completed ? 'checked' : ''} 
              onchange="toggleTodo(${index})"
            />
            <span class="todo-text ${todo.completed ? 'completed' : ''}">${todo.text}</span>
            <button class="delete-btn" onclick="deleteTodo(${index})">×</button>
          </div>
        `).join('');
      }

      updateStats();
    }

    function addTodo() {
      const input = document.getElementById('todoInput');
      const text = input.value.trim();
      
      if (text) {
        if (!todos[dateKey]) {
          todos[dateKey] = [];
        }
        todos[dateKey].push({ id: Date.now(), text, completed: false });
        input.value = '';
        saveTodos();
        renderTodos();
      }
    }

    function toggleTodo(index) {
      if (todos[dateKey] && todos[dateKey][index]) {
        todos[dateKey][index].completed = !todos[dateKey][index].completed;
        saveTodos();
        renderTodos();
      }
    }

    function deleteTodo(index) {
      if (todos[dateKey]) {
        todos[dateKey].splice(index, 1);
        saveTodos();
        renderTodos();
      }
    }

    function saveTodos() {
      localStorage.setItem('todos', JSON.stringify(todos));
    }

    function updateStats() {
      const todayTodos = todos[dateKey] || [];
      const total = todayTodos.length;
      const completed = todayTodos.filter(t => t.completed).length;
      const remaining = total - completed;

      document.getElementById('totalCount').textContent = total;
      document.getElementById('completedCount').textContent = completed;
      document.getElementById('remainingCount').textContent = remaining;
    }

    // Allow Enter key to add todo
    document.getElementById('todoInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addTodo();
    });

    // Initial render
    renderTodos();
  </script>
</body>
</html>
